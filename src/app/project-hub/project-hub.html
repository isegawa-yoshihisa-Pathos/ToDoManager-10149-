<div class="project-hub">
  <div class="hub-actions">
    <button mat-stroked-button color="primary" type="button" (click)="onAddPrivateListClick()">
      プライベートを追加
    </button>
  </div>
  <div class="project-forms">
    <div class="form-card">
      <h3 class="card-title">プロジェクトを作成</h3>
      <p class="hint">プロジェクトID は半角英数字のみ。作成後は変更できません。</p>
      <mat-form-field appearance="outline" class="field" subscriptSizing="dynamic">
        <mat-label>プロジェクトID</mat-label>
        <input
          matInput
          placeholder="例: myproject01"
          [(ngModel)]="createProjectId"
          name="createProjectId"
          autocomplete="off"
        />
        <button 
          mat-icon-button matSuffix 
          type="button" 
          matTooltip="自動生成"
          (click)="generateProjectId()">
          <mat-icon>refresh</mat-icon>
        </button>
      </mat-form-field>
      <mat-form-field appearance="outline" class="field" subscriptSizing="dynamic">
        <mat-label>プロジェクト名</mat-label>
        <input
          matInput
          placeholder="タブや設定に表示される名前"
          [(ngModel)]="createProjectDisplayName"
          name="createProjectDisplayName"
        />
      </mat-form-field>
      <mat-form-field appearance="outline" class="field" subscriptSizing="dynamic">
        <mat-label>パスワード</mat-label>
        <input
          matInput
          type="password"
          placeholder="パスワード"
          [(ngModel)]="createPassword"
          name="createPassword"
        />
      </mat-form-field>
      <button mat-flat-button color="primary" type="button" (click)="onCreateProject()">作成</button>
    </div>
    <div class="form-card">
      <h3 class="card-title">プロジェクトに参加</h3>
      <p class="hint">
        プロジェクトID・パスワードに加え、管理者によるメール認証（または事前のメール許可）が必要です。
      </p>
      <mat-form-field appearance="outline" class="field" subscriptSizing="dynamic">
        <mat-label>プロジェクトID</mat-label>
        <input
          matInput
          placeholder="プロジェクトID"
          [(ngModel)]="joinProjectId"
          name="joinProjectId"
          autocomplete="off"
        />
      </mat-form-field>
      <mat-form-field appearance="outline" class="field" subscriptSizing="dynamic">
        <mat-label>パスワード</mat-label>
        <input
          matInput
          type="password"
          placeholder="パスワード"
          [(ngModel)]="joinPassword"
          name="joinPassword"
        />
      </mat-form-field>
      <button mat-flat-button color="primary" type="button" (click)="onJoinProject()">参加</button>
    </div>
  </div>
</div>
