<div class="project-settings">
  <button mat-button type="button" (click)="back()">← 一覧へ戻る</button>

  @if (loading) {
    <p class="state">読み込み中…</p>
  } @else if (notFound) {
    <p class="state">プロジェクトが見つかりません。</p>
    <button mat-flat-button color="primary" type="button" (click)="back()">一覧へ戻る</button>
  } @else {
    <h1 class="title">{{ projectName }}</h1>
    <p class="project-id-line">プロジェクトID：<code>{{ projectId }}</code></p>

    <div class="rename-block">
      <h2 class="section-title">プロジェクト名の変更</h2>
      <p class="lead">タブ表示・この画面の見出しを更新できます。プロジェクトID は変更できません。</p>
      <div class="rename-row">
        <mat-form-field appearance="outline" class="rename-field" subscriptSizing="dynamic">
          <mat-label>新しい名前</mat-label>
          <input
            matInput
            name="projectNameEdit"
            [(ngModel)]="projectNameEdit"
            [disabled]="renameSaving"
          />
        </mat-form-field>
        <button
          mat-flat-button
          color="primary"
          type="button"
          [disabled]="renameSaving"
          (click)="saveProjectName()"
        >
          保存
        </button>
      </div>
      @if (renameError) {
        <p class="rename-error">{{ renameError }}</p>
      }
    </div>

    <h2 class="section-title">メンバー</h2>
    <app-project-members [projectId]="projectId"></app-project-members>

    <div class="toolbar toolbar-danger">
      <button mat-stroked-button type="button" (click)="onLeaveProject()">プロジェクトを脱退</button>
      <button mat-flat-button color="warn" type="button" (click)="onDeleteProject()">
        プロジェクトを削除
      </button>
    </div>
  }
</div>
