<mat-toolbar color="primary" class="app-toolbar">
  <span>AngularTodo</span>
</mat-toolbar>
<div class="user-window">
  <div class="username">ユーザー名：{{ auth.username() }}</div>
  <button mat-flat-button color="primary" type="button" (click)="signOut()">Sign out</button>
</div>

<nav class="primary-nav" aria-label="表示の切り替え">
  <div class="nav-cluster nav-cluster-start">
    <span class="nav-tab-project-wrap">
      <button
        type="button"
        class="nav-tab nav-tab-project"
        [class.active]="isDefaultPrivateTabActive()"
        (click)="selectDefaultPrivateTab()"
      >
        {{ defaultPrivateLabel() }}
      </button>
      <button
        type="button"
        class="nav-tab-menu"
        [class.active]="isDefaultPrivateTabActive()"
        aria-label="既定のプライベートリストの名称を変更"
        [matMenuTriggerFor]="defaultPrivateMenu"
        (click)="$event.stopPropagation(); $event.preventDefault()"
      >
        <span class="vertical-dots" aria-hidden="true">
          <span class="vdot"></span>
          <span class="vdot"></span>
          <span class="vdot"></span>
        </span>
      </button>
      <mat-menu #defaultPrivateMenu="matMenu">
        <button mat-menu-item type="button" (click)="promptRenameDefaultPrivate()">
          名称を変更
        </button>
      </mat-menu>
    </span>
    @for (pl of privateLists(); track pl.id) {
      <span class="nav-tab-project-wrap">
        <button
          type="button"
          class="nav-tab nav-tab-project"
          [class.active]="isPrivateListTabActive(pl.id)"
          (click)="selectPrivateList(pl.id)"
        >
          {{ pl.title }}
        </button>
        <button
          type="button"
          class="nav-tab-menu"
          [class.active]="isPrivateListTabActive(pl.id)"
          aria-label="プライベートリストの名称変更・削除"
          [matMenuTriggerFor]="extraPrivateSharedMenu"
          [matMenuTriggerData]="{ pl: pl }"
          (click)="$event.stopPropagation(); $event.preventDefault()"
        >
          <span class="vertical-dots" aria-hidden="true">
            <span class="vdot"></span>
            <span class="vdot"></span>
            <span class="vdot"></span>
          </span>
        </button>
      </span>
    }
    <mat-menu #extraPrivateSharedMenu="matMenu">
      <ng-template matMenuContent let-pl="pl">
        <button mat-menu-item type="button" (click)="renameExtraPrivate(pl)">名称を変更</button>
        <button mat-menu-item type="button" (click)="deleteExtraPrivate(pl)">削除</button>
      </ng-template>
    </mat-menu>
    @for (p of memberships; track p.projectId) {
      <span class="nav-tab-project-wrap">
        <button
          type="button"
          class="nav-tab nav-tab-project"
          [class.active]="isProjectTabActive(p.projectId)"
          (click)="openProject(p)"
        >
          {{ p.projectName }}
        </button>
        <button
          type="button"
          class="nav-tab-menu"
          [class.active]="isProjectTabActive(p.projectId)"
          aria-label="プロジェクト名の変更・メンバー・脱退・削除"
          (click)="openProjectSettings($event, p)"
        >
          <span class="vertical-dots" aria-hidden="true">
            <span class="vdot"></span>
            <span class="vdot"></span>
            <span class="vdot"></span>
          </span>
        </button>
      </span>
    }
  </div>
  <div class="nav-cluster nav-cluster-end">
    <button
      type="button"
      class="nav-tab"
      [class.active]="isProjectHubActive()"
      (click)="selectProjectHub()"
    >
      タスクリストの編集
    </button>
  </div>
</nav>

@if (mainTab() === 'private') {
  <section class="section">
    <app-task-list [taskScope]="privateTaskScope()"></app-task-list>
  </section>
}

@if (mainTab() === 'project') {
  <section class="section project-section">
    @if (!activeProject()) {
      <app-project-hub
        (projectOpened)="onProjectOpened($event)"
        (addPrivateList)="onAddPrivateList()"
      ></app-project-hub>
    } @else {
      <div class="project-detail">
        <app-task-list [taskScope]="projectTaskScope()"></app-task-list>
      </div>
    }
  </section>
}
