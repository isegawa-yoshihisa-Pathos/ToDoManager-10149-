<div class="members-panel">
  <h4 class="members-title">参加メンバー</h4>
  <ul class="member-list" *ngIf="members.length > 0">
    <li *ngFor="let m of members" class="member-row">
      <span class="member-name">{{ m.displayName }}</span>
      @if (notYou(m.userId)) {
        <mat-icon (click)="onLeaveMember(m.userId)" matTooltip="脱退" class="reject-button">cancel</mat-icon>
      }
    </li>
  </ul>
  <p *ngIf="members.length === 0" class="empty">メンバーはまだいません</p>
  <h4 class="members-title">招待中メンバー</h4>
  <ul class="member-list" *ngIf="invited.length > 0">
    <li *ngFor="let i of invited" class="member-row">
      <span class="member-name" matTooltip="招待時間：{{ i.invitedAt | date: 'yyyy/MM/dd HH:mm' }}">{{ i.email }}</span>
      <span class="inviter">By: {{ i.invitedBy }}</span>
      <mat-icon (click)="onCancelInvitation(i.email)" matTooltip="キャンセル" class="reject-button">cancel</mat-icon>
    </li>
  </ul>
</div>
