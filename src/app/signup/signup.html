<div class="signup">
  <div class="pane">
    <div class="input-container">
      <label class="subtitle">Make Account</label>
      <input type="text" placeholder="ユーザーID（半角英数字）" [(ngModel)]="userId" name="userId" />
      <input type="text" placeholder="ユーザー名" [(ngModel)]="displayName" name="displayName" />
      <input type="password" placeholder="password" [(ngModel)]="password" name="password" />
    </div>
    <div class="button-container">
      <button type="button" (click)="signUp()">Sign up</button>
      <button type="button" (click)="backToLogin()">Back to Login</button>
    </div>
  </div>
</div>
