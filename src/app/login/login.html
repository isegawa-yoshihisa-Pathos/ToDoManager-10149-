<div class="login">
    <div class="pane">
        <div class="input-container">
            <label class="subtitle">ログイン</label>
            <input type="email" placeholder="メールアドレス" [(ngModel)]="email" name="email" autocomplete="username">
            <input type="password" placeholder="パスワード" [(ngModel)]="password">
        </div>
        <div class="button-container">
            <button type='submit' (click)="signIn()">ログイン</button>
            <label class="message">アカウントがない方はこちら</label>
            <button (click)="makeAccount()">アカウント作成</button>
        </div>
    </div>
</div>
