<div
  class="task-row"
  [class.overdue]="isOverdue(task)"
  [style.--label-color]="labelStripColor()"
  (click)="onTaskRowClick($event)"
>
  <div class="label-strip" [style.background-color]="labelStripColor()"></div>
  @if (showDragHandle) {
    <button
      type="button"
      class="drag-handle"
      cdkDragHandle
      aria-label="ドラッグして並び替え"
      (click)="$event.stopPropagation()"
    >
      <mat-icon aria-hidden="true">drag_indicator</mat-icon>
    </button>
  }
  <div
    class="task-main"
    [class.done]="task.done"
    (keydown)="onTaskMainKeydown($event)"
    role="button"
    tabindex="0"
    [attr.aria-label]="'完了を切り替え: ' + task.title"
  >
    <div class="left">
      <mat-checkbox
        [ngModel]="task.done"
        (ngModelChange)="onDoneChange($event)"
        (click)="$event.stopPropagation()"
        class="task-cb"
        [attr.aria-label]="'完了: ' + task.title"
      ></mat-checkbox>
      <span class="priority-mark">{{ priorityLabel() }}</span>
      @if (taskScope.kind === 'project' && task.assignee) {
        <span class="assignee-badge" title="担当">{{ assigneeDisplay() }}</span>
      }
      <span
        class="task-title"
        [class.done]="task.done"
        [attr.title]="taskTitleTooltip()"
      >{{ taskTitleDisplay() }}</span>
    </div>

    <div class="center">
      @if (task.deadline && !task.done) {
        <span
          class="deadline-tag"
          [class.deadline-overdue]="isOverdue(task)"
        >期日：{{ task.deadline | date: 'yyyy/MM/dd' }}</span>
      }
    </div>

    <div class="actions" (click)="$event.stopPropagation()">
      <button mat-stroked-button type="button" (click)="openDetail($event)">詳細</button>
      <button
        mat-flat-button
        color="warn"
        type="button"
        class="delete-btn"
        (click)="deleteTask($event)"
        aria-label="削除"
      >
        削除
      </button>
    </div>
  </div>
</div>
